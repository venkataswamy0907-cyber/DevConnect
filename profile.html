<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>
<link rel="stylesheet" href="./style.scss/styles.css">
</head>

<body>
     <header>
            <div class="sticky_head">
            <div class="logo">
                <div class="logo_img">
                    <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#310de3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-codesandbox-icon lucide-codesandbox"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="7.5 4.21 12 6.81 16.5 4.21"/><polyline points="7.5 19.79 7.5 14.6 3 12"/><polyline points="21 12 16.5 14.6 16.5 19.79"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" x2="12" y1="22.08" y2="12"/></svg>
                </div>
                <div class="logo_content"><span>DevConnect</span></div>
            </div>
            <div class="menu">
                <span class="feed">
                    
                        <a href="index.html">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-house-icon lucide-house"><path d="M15 21v-8a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v8"/><path d="M3 10a2 2 0 0 1 .709-1.528l7-6a2 2 0 0 1 2.582 0l7 6A2 2 0 0 1 21 10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
                            <span>
                                Feed
                            </span>
                        </a>
                       
                </span>
                <span class="explore">
                    
                        <a href="explore.html">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#310de3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-search-icon lucide-search"><path d="m21 21-4.34-4.34"/><circle cx="11" cy="11" r="8"/></svg>
                            <span>
                                Explore
                            </span>
                        </a>
                    
                </span>    
                <span class="create_post">
                    
                    
                        <a href="create_post.html">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#310de3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-plus-icon lucide-plus"><line x1="12" x2="12" y1="5" y2="19"/><line x1="5" x2="19" y1="12" y2="12"/></svg>
                            <span>Create Post</span>
                        </a>
                       
                </span>
            </div>
            </div>
        </header>

<section class="profile-page-section">

<div class="profile-page">

<div class="profile-page-banner"></div>

<div class="profile-header-details">

<div class="profile-pic-address">

<div>
<img class="profile-pic" id="profile-avatar" src="" alt="profile-pic">
</div>

<div class="profile-details">

<h1 id="profile-name"></h1>

<p id="profile-username"></p>

<p id="profile-company"></p>

<div class="profile-location">

<div class="profile-address">
<span>🛄</span>
<span id="profile-company-name"></span>
</div>

<div class="profile-address">
<span>🌐</span>
<span id="profile-city"></span>
</div>

<div class="profile-address">
<span>📍</span>
<span id="profile-website"></span>
</div>

</div>

</div>
</div>

<div class="follow-btn">
<button class="follow-button" id="follow-btn">Follow</button>
</div>

</div>

</div>

</section>


<!-- PROFILE STATS -->

<section class="profile-stats">

<div class="profile-stat">

<div>
<span class="posts-count">
<strong id="post-count">0</strong>
Posts
</span>
</div>

<div>
<span class="posts-count">
<strong id="followers-count">0</strong>
Followers
</span>
</div>

<div>
<span class="posts-count">
<strong id="following-count">0</strong>
Following
</span>
</div>

</div>

</section>




<section class="posts-bar">

<div class="posts-section">

<h3>Posts</h3>

<div class="posts-individual" id="posts-container">


</div>

</div>

</section>
<footer id="footer">
        <div class="footer-section">
            <p>©️ 2026 DevConnect. Built for learning JavaScript.</p>
        </div>
    </footer>
<div id="toast" class="toast"></div>

<script src="profile.js"></script>

</body>
</html>
